<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SUHO Visual Editor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f172a;--surface:#1e293b;--surface2:#263348;--border:rgba(255,255,255,.08);
  --text:#f1f5f9;--muted:#94a3b8;--indigo:#6366f1;--cyan:#06b6d4;--green:#10b981;
  --red:#ef4444;--yellow:#f59e0b;
  --grad:linear-gradient(135deg,var(--indigo),var(--cyan));
  --radius:12px;--sidebar:240px;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:100%;max-width:440px}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo h1{font-size:1.6rem;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.login-logo p{color:var(--muted);font-size:.875rem;margin-top:6px}
.login-field{margin-bottom:18px}
.login-field label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.login-field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:.9rem;outline:none;transition:border-color .2s}
.login-field input:focus{border-color:var(--indigo)}
.login-btn{width:100%;padding:14px;background:var(--grad);border:none;border-radius:10px;color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .2s}
.login-btn:hover{opacity:.9}
.login-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;border-radius:8px;padding:10px 14px;font-size:.85rem;margin-top:12px;display:none}

/* ── EDITOR LAYOUT ── */
#editor{display:none;flex-direction:column;height:100vh;overflow:hidden}
/* TOP BAR */
.topbar{display:flex;align-items:center;gap:0;padding:0 16px;height:56px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:100}
.topbar-logo{font-size:1rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-right:20px;white-space:nowrap}
.page-tabs{display:flex;gap:4px;flex:1}
.page-tab{padding:7px 16px;border-radius:8px;border:1px solid transparent;background:none;color:var(--muted);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.page-tab:hover{background:var(--surface2);color:var(--text)}
.page-tab.active{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.3);color:var(--indigo)}
.topbar-actions{display:flex;gap:8px;margin-left:auto}
.btn-preview{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:.85rem;font-weight:600;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:6px;transition:all .2s}
.btn-preview:hover{border-color:rgba(99,102,241,.4)}
.btn-save{padding:8px 20px;border-radius:8px;border:none;background:var(--grad);color:#fff;font-size:.85rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity .2s}
.btn-save:hover{opacity:.85}
.btn-save:disabled{opacity:.5;cursor:not-allowed}

/* ── MAIN LAYOUT ── */
.editor-body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.section-list{flex:1;overflow-y:auto;padding:8px}
.section-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:all .2s;border:1px solid transparent;margin-bottom:2px}
.section-item:hover{background:var(--surface2)}
.section-item.active{background:rgba(99,102,241,.12);border-color:rgba(99,102,241,.25)}
.section-icon{font-size:1.1rem;flex-shrink:0;width:28px;text-align:center}
.section-label{font-size:.85rem;font-weight:500;color:var(--muted)}
.section-item.active .section-label{color:var(--text)}
.section-modified{width:6px;height:6px;border-radius:50%;background:var(--indigo);margin-left:auto;display:none}
.section-item.modified .section-modified{display:block}
.sidebar-footer{padding:12px;border-top:1px solid var(--border);flex-shrink:0}
.btn-defaults{width:100%;padding:8px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--muted);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-defaults:hover{background:var(--surface2);color:var(--text)}

/* FORM PANEL */
.form-panel{flex:1;overflow-y:auto;padding:24px}
.form-panel::-webkit-scrollbar{width:6px}
.form-panel::-webkit-scrollbar-track{background:transparent}
.form-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}

.section-editor{max-width:780px}
.section-editor-header{margin-bottom:28px}
.section-editor-title{font-size:1.2rem;font-weight:800;display:flex;align-items:center;gap:10px}
.section-editor-title .icon{font-size:1.4rem}
.section-editor-desc{font-size:.85rem;color:var(--muted);margin-top:6px}

/* FIELD GROUPS */
.field-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.field-card-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--indigo);margin-bottom:16px;display:flex;align-items:center;gap:6px}
.field-group{margin-bottom:14px}
.field-group:last-child{margin-bottom:0}
.field-group label{display:block;font-size:.78rem;font-weight:600;color:var(--muted);margin-bottom:6px}
.field-group input,.field-group textarea,.field-group select{
  width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;color:var(--text);font-size:.875rem;outline:none;
  font-family:inherit;transition:border-color .2s;resize:vertical
}
.field-group input:focus,.field-group textarea:focus{border-color:var(--indigo)}
.field-group textarea{min-height:70px;line-height:1.5}
.field-row{display:grid;gap:12px}
.field-row-2{grid-template-columns:1fr 1fr}
.field-row-3{grid-template-columns:2fr 1fr 1fr}

.card-block{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.card-block:last-child{margin-bottom:0}
.card-block-title{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--cyan);margin-bottom:12px}

.stat-row{display:grid;grid-template-columns:2fr 1fr 2fr;gap:8px;align-items:end;margin-bottom:10px}
.stat-row:last-child{margin-bottom:0}
.stat-label{font-size:.7rem;font-weight:600;color:var(--muted);margin-bottom:5px}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:.875rem;font-weight:600;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}
#toast.success{background:#064e3b;border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
#toast.error{background:#450a0a;border:1px solid rgba(239,68,68,.3);color:#fca5a5}

/* LOADING */
.loading-state{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);gap:10px;font-size:.9rem}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--indigo);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state h3{font-size:1.1rem;margin-bottom:8px;color:var(--text)}
</style>
</head>

/* ═══════════════════════════════════════════════
   LOGIN
═══════════════════════════════════════════════ */
function doLogin() {
  const url   = document.getElementById('inp-url').value.trim()
             || 'https://suho-news-api.biz-e3c.workers.dev';
  const token = document.getElementById('inp-token').value.trim();
  if (!token) { showLoginError('管理者トークンを入力してください'); return; }
  WORKER = url;
  TOKEN  = token;
  localStorage.setItem('suho_worker_url', WORKER);
  localStorage.setItem('suho_admin_token', TOKEN);
  startEditor();
}

function showLoginError(msg) {

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  const savedUrl   = localStorage.getItem('suho_worker_url')   || '';
  const savedToken = localStorage.getItem('suho_admin_token')  || '';
  if (savedUrl)   document.getElementById('inp-url').value   = savedUrl;
  if (savedToken) document.getElementById('inp-token').value = savedToken;
  if (savedUrl && savedToken) { WORKER = savedUrl; TOKEN = savedToken; startEditor(); }
});

async function startEditor() {
  document.getElementById('login-screen').style.display = 'none';

/* ═══════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════ */
function renderSidebar() {
  const list = document.getElementById('section-list');
  list.innerHTML = SECTIONS[currentPage].map(s => `
    <div class="section-item ${s.id === currentSection ? 'active' : ''} ${modified[currentPage+'.'+s.id]?'modified':''}"
         onclick="selectSection('${s.id}')">
      <span class="section-icon">${s.icon}</span>
      <span class="section-label">${s.label}</span>
      <span class="section-modified"></span>

function selectSection(id) {
  currentSection = id;

/* ═══════════════════════════════════════════════
   LOAD CONTENT FROM KV
═══════════════════════════════════════════════ */
async function loadContent() {
  try {
    const [homeRes, recruitRes] = await Promise.all([
      fetch(`${WORKER}/content/home`,    {cache:'no-store'}),
      fetch(`${WORKER}/content/recruit`, {cache:'no-store'}),
    ]);
    const homeData    = homeRes.ok    ? await homeRes.json()    : {};
    const recruitData = recruitRes.ok ? await recruitRes.json() : {};
    // Merge with defaults
    pageData.home    = deepMerge(JSON.parse(JSON.stringify(DEFAULTS.home)),    homeData);
    pageData.recruit = deepMerge(JSON.parse(JSON.stringify(DEFAULTS.recruit)), recruitData);
  } catch(e) {
    pageData.home    = JSON.parse(JSON.stringify(DEFAULTS.home));
    pageData.recruit = JSON.parse(JSON.stringify(DEFAULTS.recruit));
  }
}

function deepMerge(target, source) {
  if (!source || typeof source !== 'object') return target;
  for (const key of Object.keys(source)) {
    if (Array.isArray(source[key])) {
      target[key] = source[key];
    } else if (source[key] && typeof source[key] === 'object') {
      if (!target[key]) target[key] = {};
      deepMerge(target[key], source[key]);
    } else if (source[key] !== undefined) {
      target[key] = source[key];
    }
  }
  return target;
}

function loadDefaults() {
  if (!confirm('このセクションをデフォルトに戻しますか？')) return;
  const def = DEFAULTS[currentPage][currentSection];
  if (def) {
    pageData[currentPage][currentSection] = JSON.parse(JSON.stringify(def));
    renderForm();
    markModified();
    showToast('デフォルトに戻しました', 'success');
  }
}

/* ═══════════════════════════════════════════════
   SAVE
═══════════════════════════════════════════════ */
async function saveContent() {
  // Collect current form before saving
  collectCurrentForm();

  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = '保存中...';
  try {
    await Promise.all([
      fetch(`${WORKER}/content/home`, {
        method:'PUT',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
        body: JSON.stringify(pageData.home)
      }),
      fetch(`${WORKER}/content/recruit`, {
        method:'PUT',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},
        body: JSON.stringify(pageData.recruit)
      }),
    ]);
    modified = {};
    renderSidebar();
    showToast('✅ 保存しました！サイトに反映されました', 'success');
  } catch(e) {
    showToast('❌ 保存に失敗しました: ' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '💾 保存する';
  }
}

/* ═══════════════════════════════════════════════
   FORM RENDERING
═══════════════════════════════════════════════ */
function renderForm() {
  const panel = document.getElementById('form-panel');
  const data  = pageData[currentPage]?.[currentSection] || {};
  const sec   = SECTIONS[currentPage].find(s => s.id === currentSection);
  panel.innerHTML = `<div class="section-editor">
    <div class="section-editor-header">
      <div class="section-editor-title"><span class="icon">${sec.icon}</span>${sec.label}</div>
      <div class="section-editor-desc">このセクションのテキストを編集してください。変更後「保存する」をクリックしてください。</div>
    </div>
    ${buildForm(currentPage, currentSection, data)}
  </div>`;

  // Auto-save on input
  panel.querySelectorAll('input,textarea').forEach(el => {
    el.addEventListener('input', () => markModified());
  });
}

function markModified() {
  const key = currentPage + '.' + currentSection;
  modified[key] = true;
  renderSidebar();
}

function collectCurrentForm() {
  const panel = document.getElementById('form-panel');
  const data  = {};
  panel.querySelectorAll('[data-path]').forEach(el => {
    const path  = el.dataset.path.split('.');
    const value = el.value;
    let obj = data;
    for (let i = 0; i < path.length - 1; i++) {
      const k = path[i];
      if (!isNaN(k)) { /* array handled in parent */ }
      if (!obj[k]) obj[k] = isNaN(path[i+1]) ? {} : [];
      obj = obj[k];
    }
    const last = path[path.length - 1];
    if (!isNaN(last)) obj[parseInt(last)] = value;
    else obj[last] = value;
  });
  if (!pageData[currentPage]) pageData[currentPage] = {};
  pageData[currentPage][currentSection] = deepMerge(
    JSON.parse(JSON.stringify(DEFAULTS[currentPage][currentSection] || {})),
    data
  );
}

function v(data, ...keys) {
  let o = data;
  for (const k of keys) { if (o == null) return ''; o = o[k]; }
  return o ?? '';
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function input(label, path, val, placeholder='') {
  return `<div class="field-group">
    <label>${label}</label>
    <input data-path="${path}" value="${esc(val)}" placeholder="${esc(placeholder)}"/>
  </div>`;
}
function textarea(label, path, val, placeholder='') {
  return `<div class="field-group">
    <label>${label}</label>
    <textarea data-path="${path}" placeholder="${esc(placeholder)}">${esc(val)}</textarea>
  </div>`;
}
function card(title, content) {
  return `<div class="field-card"><div class="field-card-title">${title}</div>${content}</div>`;
}
function cardBlock(title, content) {
  return `<div class="card-block"><div class="card-block-title">${title}</div>${content}</div>`;
}
function statRow(prefix, stat, i) {
  return `<div class="stat-row">
    <div><div class="stat-label">数値</div><input data-path="${prefix}.${i}.number" value="${esc(stat?.number||'')}" placeholder="200"/></div>
    <div><div class="stat-label">単位</div><input data-path="${prefix}.${i}.unit" value="${esc(stat?.unit||'')}" placeholder="+"/></div>
    <div><div class="stat-label">ラベル</div><input data-path="${prefix}.${i}.label" value="${esc(stat?.label||'')}" placeholder="クライアント"/></div>
  </div>`;
}

/* ─── Form builders ─── */
function buildForm(page, section, data) {
  if (page === 'home') {
    switch(section) {
      case 'hero':       return formHomeHero(data);
      case 'aiService':  return formAiService(data);
      case 'cloud':      return formCloud(data);
      case 'managed':    return formManaged(data);
      case 'products':   return formProducts(data);
      case 'about':      return formAbout(data);
      case 'contact':    return formContact(data);
    }
  }
  if (page === 'recruit') {
    switch(section) {
      case 'hero':       return formRecruitHero(data);
      case 'conditions': return formConditions(data);
      case 'salary':     return formSalary(data);
      case 'benefits':   return formBenefits(data);
      case 'cta':        return formCta(data);
    }
  }
  return '<p style="color:var(--muted)">このセクションは編集できません</p>';
}

/* ═══════════════════════════════════════════════

═══════════════════════════════════════════════ */
function switchPage(page) {
  collectCurrentForm();
  currentPage = page;
  currentSection = SECTIONS[page][0].id;
  document.querySelectorAll('.page-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.page === page));
  const pg = page === 'home' ? '../index.html' : '../recruit.html';
  document.getElementById('preview-link').href = pg;
  renderSidebar();
  renderForm();
}

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${type}`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = ''; }, 3500);
}
