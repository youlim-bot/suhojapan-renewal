<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SUHO ニュース管理</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0f172a;
      --surface:  #1e293b;
      --border:   rgba(255,255,255,.08);
      --text:     #f1f5f9;
      --muted:    #94a3b8;
      --indigo:   #6366f1;
      --cyan:     #06b6d4;
      --green:    #10b981;
      --red:      #ef4444;
      --yellow:   #f59e0b;
      --radius:   12px;
    }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: inherit; border: none; outline: none; }

    /* ── Login ─────────────────────────────────── */
    #login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      width: 400px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 48px 40px; text-align: center;
    }
    .login-logo {
      width: 56px; height: 56px; border-radius: 14px;
      background: linear-gradient(135deg, var(--indigo), var(--cyan));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; margin: 0 auto 24px;
    }
    .login-card h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
    .login-card p  { color: var(--muted); font-size: .875rem; margin-bottom: 32px; }
    .field { text-align: left; margin-bottom: 16px; }
    .field label { display: block; font-size: .8rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; letter-spacing: .06em; text-transform: uppercase; }
    .field input {
      width: 100%; padding: 12px 14px; border-radius: 10px;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); font-size: .9rem; font-family: inherit;
      transition: border-color .2s;
    }
    .field input:focus { border-color: var(--indigo); outline: none; }
    .btn-login {
      width: 100%; padding: 13px; border-radius: 10px; font-size: .95rem; font-weight: 700;
      background: linear-gradient(135deg, var(--indigo), var(--cyan));
      color: #fff; margin-top: 8px; transition: opacity .2s;
    }
    .btn-login:hover { opacity: .9; }
    .login-error { color: var(--red); font-size: .82rem; margin-top: 12px; }

    /* ── App Layout ─────────────────────────────── */
    #app { display: none; min-height: 100vh; flex-direction: column; }
    #app.visible { display: flex; }

    .app-header {
      height: 60px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 24px; gap: 16px; position: sticky; top: 0; z-index: 100;
    }
    .app-header .logo {
      display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.1rem;
    }
    .app-header .logo span {
      background: linear-gradient(135deg, var(--indigo), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .app-header .logo img { width: 32px; height: 32px; border-radius: 8px; }
    .header-spacer { flex: 1; }
    .btn-logout {
      padding: 7px 16px; border-radius: 8px; font-size: .82rem; font-weight: 600;
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      transition: all .2s;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    .app-body { flex: 1; padding: 32px 28px; max-width: 1200px; margin: 0 auto; width: 100%; }

    /* ── Toolbar ─────────────────────────────────── */
    .toolbar {
      display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .toolbar h1 { font-size: 1.3rem; font-weight: 700; flex: 1; }
    .btn-new {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 10px; font-size: .9rem; font-weight: 700;
      background: linear-gradient(135deg, var(--indigo), var(--cyan)); color: #fff;
      transition: opacity .2s; white-space: nowrap;
    }
    .btn-new:hover { opacity: .9; }
    .btn-seed {
      padding: 10px 16px; border-radius: 10px; font-size: .82rem; font-weight: 600;
      background: rgba(245,158,11,.12); border: 1px solid rgba(245,158,11,.3); color: var(--yellow);
      transition: all .2s; white-space: nowrap;
    }
    .btn-seed:hover { background: rgba(245,158,11,.2); }
    .search-wrap { position: relative; }
    .search-wrap input {
      padding: 10px 14px 10px 36px; border-radius: 10px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-size: .875rem; font-family: inherit; width: 220px;
    }
    .search-wrap input:focus { border-color: var(--indigo); outline: none; }
    .search-wrap .si { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: .95rem; }

    /* ── Stats ───────────────────────────────────── */
    .stats { display: flex; gap: 16px; margin-bottom: 24px; }
    .stat-card {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
    }
    .stat-card .num { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg,var(--indigo),var(--cyan)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .stat-card .lbl { font-size: .78rem; color: var(--muted); margin-top: 4px; }

    /* ── Article List ────────────────────────────── */
    .article-table {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden;
    }
    .at-header {
      display: grid; grid-template-columns: 60px 1fr 120px 110px 90px;
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      font-size: .75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em;
    }
    .at-row {
      display: grid; grid-template-columns: 60px 1fr 120px 110px 90px;
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      align-items: center; transition: background .15s;
    }
    .at-row:last-child { border-bottom: none; }
    .at-row:hover { background: rgba(255,255,255,.03); }
    .at-thumb {
      width: 44px; height: 44px; border-radius: 10px; overflow: hidden;
      background: linear-gradient(135deg, rgba(99,102,241,.2), rgba(6,182,212,.1));
      display: flex; align-items: center; justify-content: center; font-size: 1.4rem;
      border: 1px solid var(--border); flex-shrink: 0;
    }
    .at-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .at-info { padding-right: 16px; min-width: 0; }
    .at-title {
      font-size: .9rem; font-weight: 600; line-height: 1.4;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .at-featured-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .68rem; font-weight: 700; padding: 2px 8px; border-radius: 6px;
      background: rgba(245,158,11,.15); color: var(--yellow); border: 1px solid rgba(245,158,11,.3);
    }
    .at-cat {
      font-size: .75rem; font-weight: 600; padding: 4px 10px; border-radius: 6px;
      width: fit-content;
    }
    .cat-corporate   { background: rgba(99,102,241,.12); color: var(--indigo); border: 1px solid rgba(99,102,241,.2); }
    .cat-service     { background: rgba(6,182,212,.12);  color: var(--cyan);   border: 1px solid rgba(6,182,212,.2); }
    .cat-partnership { background: rgba(245,158,11,.12); color: var(--yellow); border: 1px solid rgba(245,158,11,.2); }
    .cat-event       { background: rgba(16,185,129,.12); color: var(--green);  border: 1px solid rgba(16,185,129,.2); }
    .at-date { font-size: .82rem; color: var(--muted); }
    .at-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-edit, .btn-del {
      width: 32px; height: 32px; border-radius: 8px; font-size: .9rem;
      display: flex; align-items: center; justify-content: center; transition: all .2s;
    }
    .btn-edit { background: rgba(99,102,241,.12); color: var(--indigo); border: 1px solid rgba(99,102,241,.2); }
    .btn-edit:hover { background: rgba(99,102,241,.25); }
    .btn-del  { background: rgba(239,68,68,.1);  color: var(--red);    border: 1px solid rgba(239,68,68,.2); }
    .btn-del:hover  { background: rgba(239,68,68,.2); }
    .no-articles { padding: 60px 20px; text-align: center; color: var(--muted); }
    .no-articles .ni { font-size: 2.5rem; margin-bottom: 12px; }

    /* ── Overlay / Form ──────────────────────────── */
    .overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
    }
    .overlay.open { display: flex; align-items: flex-start; justify-content: flex-end; }
    .panel {
      width: 520px; max-width: 100vw; height: 100vh;
      background: var(--surface); border-left: 1px solid var(--border);
      overflow-y: auto; display: flex; flex-direction: column;
    }
    .panel-header {
      padding: 22px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; position: sticky; top: 0;
      background: var(--surface); z-index: 10;
    }
    .panel-header h2 { font-size: 1.05rem; font-weight: 700; flex: 1; }
    .btn-close {
      width: 34px; height: 34px; border-radius: 8px; font-size: 1.1rem;
      background: rgba(255,255,255,.06); color: var(--muted); border: 1px solid var(--border);
      transition: all .2s;
    }
    .btn-close:hover { background: rgba(239,68,68,.15); color: var(--red); }
    .panel-body { padding: 24px; flex: 1; }
    .panel-footer {
      padding: 16px 24px; border-top: 1px solid var(--border);
      display: flex; gap: 10px; justify-content: flex-end;
      position: sticky; bottom: 0; background: var(--surface);
    }
    .btn-cancel {
      padding: 10px 20px; border-radius: 10px; font-size: .9rem; font-weight: 600;
      background: rgba(255,255,255,.06); color: var(--muted); border: 1px solid var(--border);
      transition: all .2s;
    }
    .btn-cancel:hover { background: rgba(255,255,255,.1); color: var(--text); }
    .btn-save {
      padding: 10px 24px; border-radius: 10px; font-size: .9rem; font-weight: 700;
      background: linear-gradient(135deg, var(--indigo), var(--cyan)); color: #fff;
      transition: opacity .2s; display: flex; align-items: center; gap: 8px;
    }
    .btn-save:hover { opacity: .9; }

    /* Form fields */
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: .78rem; font-weight: 700; color: var(--muted);
      margin-bottom: 6px; letter-spacing: .06em; text-transform: uppercase;
    }
    .form-group label .req { color: var(--red); margin-left: 2px; }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%; padding: 11px 14px; border-radius: 10px;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); font-size: .9rem; font-family: inherit;
      transition: border-color .2s; resize: vertical;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus { border-color: var(--indigo); outline: none; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Image upload */
    .img-upload-area {
      border: 2px dashed var(--border); border-radius: 14px;
      padding: 28px 20px; text-align: center; cursor: pointer;
      transition: all .2s; position: relative; overflow: hidden;
    }
    .img-upload-area:hover, .img-upload-area.drag { border-color: var(--indigo); background: rgba(99,102,241,.05); }
    .img-upload-area .up-icon { font-size: 2rem; margin-bottom: 10px; }
    .img-upload-area p { font-size: .85rem; color: var(--muted); }
    .img-upload-area p strong { color: var(--indigo); }
    .img-upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .img-preview {
      position: relative; border-radius: 12px; overflow: hidden;
      border: 1px solid var(--border); background: var(--bg);
    }
    .img-preview img { width: 100%; height: 160px; object-fit: cover; display: block; }
    .img-preview-emoji { height: 80px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
    .img-remove {
      position: absolute; top: 8px; right: 8px; width: 26px; height: 26px;
      border-radius: 50%; background: rgba(0,0,0,.6); color: #fff;
      display: flex; align-items: center; justify-content: center; font-size: .7rem; cursor: pointer;
      transition: background .2s;
    }
    .img-remove:hover { background: var(--red); }

    /* Toggle switch */
    .toggle-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px; border-radius: 12px; background: var(--bg); border: 1px solid var(--border);
    }
    .toggle-row .tr-info { flex: 1; }
    .toggle-row .tr-label { font-size: .9rem; font-weight: 600; margin-bottom: 2px; }
    .toggle-row .tr-desc  { font-size: .78rem; color: var(--muted); }
    .toggle {
      position: relative; width: 44px; height: 24px; flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute; inset: 0; border-radius: 12px;
      background: rgba(255,255,255,.1); border: 1px solid var(--border);
      transition: background .2s;
    }
    .toggle input:checked + .toggle-track { background: linear-gradient(135deg, var(--indigo), var(--cyan)); border-color: transparent; }
    .toggle-thumb {
      position: absolute; top: 2px; left: 2px; width: 18px; height: 18px;
      border-radius: 50%; background: #fff; transition: left .2s;
      box-shadow: 0 1px 4px rgba(0,0,0,.3);
    }
    .toggle input:checked ~ .toggle-thumb { left: 22px; }

    /* Delete confirm */
    .del-dialog {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
    }
    .del-dialog.open { display: flex; }
    .del-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 32px 28px; max-width: 360px; text-align: center;
    }
    .del-card .del-icon { font-size: 2.5rem; margin-bottom: 14px; }
    .del-card h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 8px; }
    .del-card p  { font-size: .85rem; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
    .del-btns { display: flex; gap: 10px; justify-content: center; }
    .btn-del-cancel { padding: 10px 22px; border-radius: 10px; font-size: .9rem; font-weight: 600; background: rgba(255,255,255,.06); color: var(--muted); border: 1px solid var(--border); transition: all .2s; }
    .btn-del-cancel:hover { color: var(--text); }
    .btn-del-confirm { padding: 10px 22px; border-radius: 10px; font-size: .9rem; font-weight: 700; background: var(--red); color: #fff; transition: opacity .2s; }
    .btn-del-confirm:hover { opacity: .85; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 400;
      padding: 12px 20px; border-radius: 12px; font-size: .875rem; font-weight: 600;
      background: var(--green); color: #fff; opacity: 0; transform: translateY(8px);
      transition: all .3s; pointer-events: none;
    }
    .toast.error { background: var(--red); }
    .toast.show  { opacity: 1; transform: translateY(0); }

    /* Loading */
    .loading { text-align: center; padding: 60px; color: var(--muted); }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--indigo); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Uploading indicator */
    .upload-progress { font-size: .8rem; color: var(--cyan); margin-top: 6px; display: none; }
    .upload-progress.show { display: block; }

    @media (max-width: 768px) {
      .at-header, .at-row { grid-template-columns: 50px 1fr 90px; }
      .at-header > *:nth-child(3), .at-row > *:nth-child(3) { display: none; }
      .stats { flex-wrap: wrap; }
      .stat-card { min-width: calc(50% - 8px); }
      .panel { width: 100vw; }
    }
  </style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">📰</div>
    <h1>SUHO 管理者ページ</h1>
    <p>Worker URLと管理者トークンを入力してください</p>
    <div class="field">
      <label>Worker URL</label>
      <input id="inp-url" type="url" placeholder="https://suho-news.xxx.workers.dev" />
    </div>
    <div class="field">
      <label>管理者トークン</label>
      <input id="inp-token" type="password" placeholder="管理者パスワード" />
    </div>
    <button class="btn-login" onclick="login()">ログイン →</button>
    <div class="login-error" id="login-err"></div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
  <header class="app-header">
    <div class="logo">
      <img src="../assets/suho-logo.png" alt="SUHO" onerror="this.style.display='none'" />
      <span>SUHO</span>
    </div>
    <div style="font-size:.82rem;color:var(--muted);margin-left:4px">ニュース管理</div>
    <div class="header-spacer"></div>
    <button class="btn-logout" onclick="logout()">ログアウト</button>
  </header>

  <div class="app-body">
    <!-- Toolbar -->
    <div class="toolbar">
      <h1>記事一覧</h1>
      <div class="search-wrap">
        <span class="si">🔍</span>
        <input id="search-inp" placeholder="記事を検索..." oninput="renderList()" />
      </div>
      <button class="btn-seed" onclick="seedInitialData()" title="news-data.json の初期データをインポート">📥 初期データ投入</button>
      <button class="btn-new" onclick="openForm()">＋ 新規記事</button>
    </div>

    <!-- Stats -->
    <div class="stats" id="stats"></div>

    <!-- Article list -->
    <div class="article-table" id="article-list">
      <div class="loading"><div class="spinner"></div>読み込み中…</div>
    </div>
  </div>
</div>

<!-- ===== FORM PANEL ===== -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="panel" id="panel">
    <div class="panel-header">
      <h2 id="panel-title">新規記事を追加</h2>
      <button class="btn-close" onclick="closeForm()">✕</button>
    </div>
    <div class="panel-body">

      <!-- Image upload -->
      <div class="form-group">
        <label>サムネイル画像（任意）</label>
        <div id="upload-area" class="img-upload-area" ondragover="onDrag(event,true)" ondragleave="onDrag(event,false)" ondrop="onDrop(event)">
          <div class="up-icon">🖼️</div>
          <p>ここにドラッグ＆ドロップ<br/>または <strong>クリックして選択</strong></p>
          <input type="file" id="img-input" accept="image/*" onchange="onImageSelect(event)" />
        </div>
        <div id="img-preview-wrap" style="display:none"></div>
        <div class="upload-progress" id="upload-progress">⏳ アップロード中…</div>
      </div>

      <!-- Emoji (shown when no image) -->
      <div class="form-group" id="emoji-group">
        <label>アイコン絵文字（画像なしの場合）</label>
        <input id="f-emoji" type="text" placeholder="例: 🤝 🛡️ ☁️ 🎮" maxlength="4" value="📰" />
      </div>

      <!-- Title -->
      <div class="form-group">
        <label>タイトル <span class="req">*</span></label>
        <input id="f-title" type="text" placeholder="記事のタイトルを入力" />
      </div>

      <!-- Category & Date -->
      <div class="form-row">
        <div class="form-group">
          <label>カテゴリ <span class="req">*</span></label>
          <select id="f-category">
            <option value="corporate">コーポレート</option>
            <option value="service">サービス</option>
            <option value="partnership">パートナーシップ</option>
            <option value="event">イベント</option>
          </select>
        </div>
        <div class="form-group">
          <label>日付 <span class="req">*</span></label>
          <input id="f-date" type="date" />
        </div>
      </div>

      <!-- Excerpt -->
      <div class="form-group">
        <label>概要文（一覧に表示）</label>
        <textarea id="f-excerpt" rows="3" placeholder="1〜2文程度の概要を入力してください"></textarea>
      </div>

      <!-- Link -->
      <div class="form-group">
        <label>詳細ページURL（任意）</label>
        <input id="f-link" type="url" placeholder="https://... （なければ空白）" />
      </div>

      <!-- Featured toggle -->
      <div class="form-group">
        <label>表示設定</label>
        <div class="toggle-row">
          <div class="tr-info">
            <div class="tr-label">⭐ フィーチャー記事として表示</div>
            <div class="tr-desc">ONにするとページ上部に大きく表示されます（1件のみ有効）</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="f-featured" />
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
        </div>
      </div>

    </div>
    <div class="panel-footer">
      <button class="btn-cancel" onclick="closeForm()">キャンセル</button>
      <button class="btn-save" onclick="saveArticle()">
        <span id="save-txt">保存する</span>
      </button>
    </div>
  </div>
</div>

<!-- ===== DELETE CONFIRM ===== -->
<div class="del-dialog" id="del-dialog">
  <div class="del-card">
    <div class="del-icon">🗑️</div>
    <h3>記事を削除しますか？</h3>
    <p id="del-target-title" style="color:var(--text);font-weight:600;margin-bottom:8px"></p>
    <p>この操作は元に戻せません。</p>
    <div class="del-btns">
      <button class="btn-del-cancel" onclick="closeDelete()">キャンセル</button>
      <button class="btn-del-confirm" onclick="confirmDelete()">削除する</button>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<script>
  /* ── Config ─────────────────────────────────────────── */
  let WORKER_URL  = localStorage.getItem('suho_worker_url')  || '';
  let ADMIN_TOKEN = localStorage.getItem('suho_admin_token') || '';

  /* ── State ──────────────────────────────────────────── */
  let articles  = [];
  let editingId = null;
  let deleteId  = null;
  let uploadedImageUrl = '';

  /* ── API Helpers ─────────────────────────────────────── */
  async function api(method, path, body) {
    const opts = {
      method,
      headers: {
        'Authorization': `Bearer ${ADMIN_TOKEN}`,
        ...(body && !(body instanceof FormData) ? { 'Content-Type': 'application/json' } : {})
      },
      ...(body ? { body: body instanceof FormData ? body : JSON.stringify(body) } : {})
    };
    const res = await fetch(`${WORKER_URL}${path}`, opts);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    return data;
  }

  /* ── Auth ────────────────────────────────────────────── */
  async function login() {
    const url   = document.getElementById('inp-url').value.trim().replace(/\/$/, '');
    const token = document.getElementById('inp-token').value.trim();
    const err   = document.getElementById('login-err');
    err.textContent = '';
    if (!url || !token) { err.textContent = 'URLとトークンを入力してください'; return; }

    try {
      const res = await fetch(`${url}/articles`);
      if (!res.ok) throw new Error('接続できませんでした');
      WORKER_URL  = url;
      ADMIN_TOKEN = token;
      localStorage.setItem('suho_worker_url',   WORKER_URL);
      localStorage.setItem('suho_admin_token',  ADMIN_TOKEN);
      await initApp();
    } catch (e) {
      err.textContent = `ログイン失敗: ${e.message}`;
    }
  }

  function logout() {
    localStorage.removeItem('suho_worker_url');
    localStorage.removeItem('suho_admin_token');
    location.reload();
  }

  /* ── Init ────────────────────────────────────────────── */
  async function initApp() {
    document.getElementById('login-screen').style.display = 'none';
    const app = document.getElementById('app');
    app.classList.add('visible');
    await loadArticles();
    // Today's date as default
    document.getElementById('f-date').value = new Date().toISOString().slice(0, 10);
  }

  async function loadArticles() {
    try {
      const data = await api('GET', '/articles');
      articles = data.articles || [];
      renderStats();
      renderList();
    } catch (e) {
      showToast('データ読み込みエラー: ' + e.message, true);
    }
  }

  /* ── Stats ───────────────────────────────────────────── */
  const CAT_LABELS = { corporate: 'コーポレート', service: 'サービス', partnership: 'パートナーシップ', event: 'イベント' };
  function renderStats() {
    const total  = articles.length;
    const cats   = [...new Set(articles.map(a => a.category))].length;
    const latest = articles[0]?.date || '—';
    document.getElementById('stats').innerHTML = `
      <div class="stat-card"><div class="num">${total}</div><div class="lbl">総記事数</div></div>
      <div class="stat-card"><div class="num">${cats}</div><div class="lbl">カテゴリ数</div></div>
      <div class="stat-card"><div class="num" style="font-size:1.2rem">${latest}</div><div class="lbl">最新記事日付</div></div>
    `;
  }

  /* ── List Render ─────────────────────────────────────── */
  function renderList() {
    const q   = (document.getElementById('search-inp').value || '').toLowerCase();
    const filtered = q ? articles.filter(a => a.title.toLowerCase().includes(q) || (a.excerpt || '').toLowerCase().includes(q)) : articles;
    const list = document.getElementById('article-list');

    if (!filtered.length) {
      list.innerHTML = '<div class="no-articles"><div class="ni">📭</div><p>記事がありません</p></div>';
      return;
    }

    const thumb = a => a.image
      ? `<div class="at-thumb"><img src="${a.image}" alt="" loading="lazy"/></div>`
      : `<div class="at-thumb">${a.emoji || '📰'}</div>`;

    const catCls = { corporate: 'cat-corporate', service: 'cat-service', partnership: 'cat-partnership', event: 'cat-event' };

    list.innerHTML = `
      <div class="at-header"><div>画像</div><div>タイトル</div><div>カテゴリ</div><div>日付</div><div></div></div>
      ${filtered.map(a => `
        <div class="at-row">
          ${thumb(a)}
          <div class="at-info">
            <div class="at-title">${escHtml(a.title)}</div>
            ${a.featured ? '<div class="at-featured-badge">⭐ Featured</div>' : ''}
          </div>
          <div><span class="at-cat ${catCls[a.category] || ''}">${CAT_LABELS[a.category] || a.category}</span></div>
          <div class="at-date">${a.date}</div>
          <div class="at-actions">
            <button class="btn-edit" onclick="openEdit('${a.id}')" title="編集">✏️</button>
            <button class="btn-del"  onclick="openDelete('${a.id}')" title="削除">🗑️</button>
          </div>
        </div>`).join('')}`;
  }

  /* ── Form Open/Close ──────────────────────────────────── */
  function openForm(article) {
    editingId        = article ? article.id : null;
    uploadedImageUrl = article?.image || '';

    document.getElementById('panel-title').textContent = article ? '記事を編集' : '新規記事を追加';
    document.getElementById('f-title').value    = article?.title    || '';
    document.getElementById('f-category').value = article?.category || 'corporate';
    document.getElementById('f-date').value     = article ? dateToInput(article.date) : new Date().toISOString().slice(0,10);
    document.getElementById('f-excerpt').value  = article?.excerpt  || '';
    document.getElementById('f-link').value     = (article?.link && article.link !== '#') ? article.link : '';
    document.getElementById('f-emoji').value    = article?.emoji    || '📰';
    document.getElementById('f-featured').checked = !!article?.featured;
    document.getElementById('save-txt').textContent = article ? '更新する' : '保存する';

    setImagePreview(article?.image || '');
    document.getElementById('overlay').classList.add('open');
  }

  function openEdit(id) {
    const a = articles.find(a => a.id === id);
    if (a) openForm(a);
  }

  function closeForm() {
    document.getElementById('overlay').classList.remove('open');
    editingId = null;
    uploadedImageUrl = '';
  }

  function overlayClick(e) {
    if (e.target === document.getElementById('overlay')) closeForm();
  }

  /* ── Image Upload ──────────────────────────────────────── */
  function onDrag(e, over) {
    e.preventDefault();
    document.getElementById('upload-area').classList.toggle('drag', over);
  }
  function onDrop(e) {
    e.preventDefault();
    onDrag(e, false);
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) uploadImage(file);
  }
  function onImageSelect(e) {
    const file = e.target.files[0];
    if (file) uploadImage(file);
    e.target.value = '';
  }

  async function uploadImage(file) {
    const prog = document.getElementById('upload-progress');
    prog.classList.add('show');
    try {
      // Resize & compress client-side
      const compressed = await compressImage(file, 800);
      const fd = new FormData();
      fd.append('image', compressed, file.name);
      const data = await api('POST', '/upload', fd);
      uploadedImageUrl = data.url;
      setImagePreview(uploadedImageUrl);
    } catch (e) {
      showToast('画像アップロード失敗: ' + e.message, true);
    } finally {
      prog.classList.remove('show');
    }
  }

  function compressImage(file, maxWidth) {
    return new Promise(resolve => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        const scale = Math.min(1, maxWidth / img.width);
        const canvas = document.createElement('canvas');
        canvas.width  = img.width  * scale;
        canvas.height = img.height * scale;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        canvas.toBlob(blob => resolve(new File([blob], file.name, { type: 'image/jpeg' })), 'image/jpeg', 0.82);
      };
      img.src = url;
    });
  }

  function setImagePreview(url) {
    const wrap = document.getElementById('img-preview-wrap');
    const area = document.getElementById('upload-area');
    if (url) {
      wrap.style.display = 'block';
      area.style.display = 'none';
      wrap.innerHTML = `
        <div class="img-preview">
          <img src="${url}" alt="プレビュー" />
          <div class="img-remove" onclick="removeImage()">✕</div>
        </div>`;
    } else {
      wrap.style.display = 'none';
      area.style.display = '';
    }
  }

  function removeImage() {
    uploadedImageUrl = '';
    setImagePreview('');
  }

  /* ── Save ─────────────────────────────────────────────── */
  async function saveArticle() {
    const title    = document.getElementById('f-title').value.trim();
    const category = document.getElementById('f-category').value;
    const dateRaw  = document.getElementById('f-date').value;
    const excerpt  = document.getElementById('f-excerpt').value.trim();
    const link     = document.getElementById('f-link').value.trim() || '#';
    const emoji    = document.getElementById('f-emoji').value.trim() || '📰';
    const featured = document.getElementById('f-featured').checked;

    if (!title)   { showToast('タイトルを入力してください', true); return; }
    if (!dateRaw) { showToast('日付を選択してください', true); return; }

    const date = dateRaw.replace(/-/g, '.');
    const article = { title, category, date, excerpt, link, emoji, featured, ...(uploadedImageUrl ? { image: uploadedImageUrl } : {}) };

    const saveTxt = document.getElementById('save-txt');
    saveTxt.textContent = '保存中…';

    try {
      if (editingId) {
        const updated = await api('PUT', `/articles/${editingId}`, article);
        const idx = articles.findIndex(a => a.id === editingId);
        articles[idx] = updated;
        showToast('記事を更新しました ✓');
      } else {
        const created = await api('POST', '/articles', article);
        articles.unshift(created);
        showToast('記事を追加しました ✓');
      }
      renderStats();
      renderList();
      closeForm();
    } catch (e) {
      showToast('保存に失敗しました: ' + e.message, true);
    } finally {
      saveTxt.textContent = editingId ? '更新する' : '保存する';
    }
  }

  /* ── Delete ───────────────────────────────────────────── */
  function openDelete(id) {
    deleteId = id;
    const a = articles.find(a => a.id === id);
    document.getElementById('del-target-title').textContent = a?.title || '';
    document.getElementById('del-dialog').classList.add('open');
  }
  function closeDelete() {
    deleteId = null;
    document.getElementById('del-dialog').classList.remove('open');
  }
  async function confirmDelete() {
    if (!deleteId) return;
    try {
      await api('DELETE', `/articles/${deleteId}`);
      articles = articles.filter(a => a.id !== deleteId);
      showToast('記事を削除しました');
      renderStats();
      renderList();
      closeDelete();
    } catch (e) {
      showToast('削除に失敗しました: ' + e.message, true);
    }
  }

  /* ── Seed Initial Data ────────────────────────────────── */
  async function seedInitialData() {
    if (!confirm('news-data.json の初期データをWorkerに投入します。既存データは上書きされます。続けますか？')) return;
    try {
      const res  = await fetch('../news-data.json');
      const data = await res.json();
      await api('POST', '/seed', { articles: data.articles });
      showToast(`${data.articles.length}件のデータを投入しました ✓`);
      await loadArticles();
    } catch (e) {
      showToast('投入に失敗しました: ' + e.message, true);
    }
  }

  /* ── Helpers ──────────────────────────────────────────── */
  function dateToInput(d) {
    // "2025.08.04" → "2025-08-04"
    return d ? d.replace(/\./g, '-') : '';
  }
  function escHtml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = `toast${isError ? ' error' : ''}`;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  /* ── Auto-login if credentials stored ────────────────── */
  (async function() {
    if (WORKER_URL && ADMIN_TOKEN) {
      try {
        const res = await fetch(`${WORKER_URL}/articles`);
        if (res.ok) { await initApp(); return; }
      } catch {}
    }
    // Show login screen
    document.getElementById('login-screen').style.display = '';
  })();

  // Enter key on login
  ['inp-url','inp-token'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  });
</script>
</body>
</html>
