name       = "suho-news-api"
main       = "worker.js"
compatibility_date = "2024-01-01"

# KV ネームスペース（記事データを保存）
[[kv_namespaces]]
binding = "NEWS_KV"
id      = "3a2fd53f257140ec80b5e6932d734373"

# R2 バケット（画像を保存）
[[r2_buckets]]
binding     = "NEWS_R2"
bucket_name = "suho-news-images"

# ADMIN_TOKEN は wrangler secret put ADMIN_TOKEN で設定済み
